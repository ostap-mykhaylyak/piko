version: 2

project_name: piko

builds:
  - id: piko
    main: ./cmd/piko
    binary: piko
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: piko-deb
    package_name: piko
    formats: [deb]
    maintainer: Ostap Mykhaylyak <me@ostap.dev>
    description: MySQL proxy for WordPress and WooCommerce
    homepage: https://github.com/ostap-mykhaylyak/piko
    license: MIT
    bindir: /usr/bin
    contents:
      - src: packaging/piko.service
        dst: /lib/systemd/system/piko.service
      - src: packaging/piko.logrotate
        dst: /etc/logrotate.d/piko
    scripts:
      postinstall: packaging/postinstall.sh

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
