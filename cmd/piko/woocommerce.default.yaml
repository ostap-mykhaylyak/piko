# WooCommerce query optimization rules for piko.
# Generated by `piko --init` in conf.d/.
#
# Every *.yaml file in this directory is loaded at startup when the cache is
# enabled, and reloaded on SIGHUP (systemctl reload piko). Each rule caches
# SELECTs matching `match` (an RE2 regular expression) for `ttl`, and drops
# the cached entries as soon as a write touches one of the `invalidate_on`
# tables. The {prefix} placeholder expands to cache.table_prefix, so these
# rules work with any WordPress $table_prefix.
#
# Note: carts and customer sessions are deliberately NOT cached, they are
# per-user data. The rules below target the global product data that cart
# calculations and catalog pages read over and over.

name: woocommerce

rules:
  # Product and order meta loaded by WordPress on catalog, cart and checkout
  # pages (update_meta_cache). Invalidated by any postmeta write, e.g. a
  # stock update after an order.
  - name: postmeta-lookup
    match: "(?i)^SELECT post_id, meta_key, meta_value FROM {prefix}postmeta WHERE post_id IN \\([0-9,\\s]+\\) ORDER BY meta_id ASC$"
    ttl: 60s
    invalidate_on: ["{prefix}postmeta"]

  # Product attribute taxonomies: read on every shop page, they change only
  # when attributes are edited in the admin.
  - name: attribute-taxonomies
    match: "(?i)^SELECT \\* FROM {prefix}woocommerce_attribute_taxonomies"
    ttl: 10m
    invalidate_on: ["{prefix}woocommerce_attribute_taxonomies"]

  # Term and taxonomy lookups for product categories and tags.
  - name: taxonomy-terms
    match: "(?i)^SELECT t\\.\\*, tt\\.\\* FROM {prefix}terms AS t INNER JOIN {prefix}term_taxonomy AS tt"
    ttl: 5m
    invalidate_on: ["{prefix}terms", "{prefix}term_taxonomy", "{prefix}term_relationships"]

  # Product listing / search queries (shop, category, filters, search box).
  # These use SQL_CALC_FOUND_ROWS + FOUND_ROWS() for pagination; piko caches
  # the rows and the pagination count together, so the page counts stay
  # correct. Shop/category page 1 is identical for every visitor, so this is
  # a big win; searches (LIKE '%...%') are also cached but their high
  # cardinality means a lower hit rate (the real fix for those is a FULLTEXT
  # index or a search plugin — see piko's "fulltext" index suggestions).
  # Short TTL keeps listings fresh as products, stock and prices change.
  - name: product-listing
    match: "(?is)^SELECT SQL_CALC_FOUND_ROWS\\s+{prefix}posts\\.ID\\s+FROM {prefix}posts\\b.*\\bpost_type\\s*=\\s*'product'"
    ttl: 60s
    invalidate_on: ["{prefix}posts", "{prefix}postmeta"]

# Query rewrites: each rule replaces every regex match in the query text
# before execution (replace supports $1 capture references; empty deletes
# the match). Disabled by default because rewrites change semantics: enable
# them after checking the "rewrite suggestion" entries piko's profiling
# writes to the log.
#
# rewrites:
#   # ORDER BY RAND() sorts the whole table on every execution. Removing it
#   # makes the row order undefined, fine for "random-ish product" widgets.
#   - name: remove-order-by-rand
#     match: "(?i)\\s*ORDER\\s+BY\\s+RAND\\s*\\(\\s*\\)"
#     replace: ""
#
#   # SQL_CALC_FOUND_ROWS counts all rows past the LIMIT. Enable ONLY if
#   # nothing reads FOUND_ROWS() afterwards (in WordPress prefer
#   # 'no_found_rows' => true in WP_Query).
#   - name: remove-sql-calc-found-rows
#     match: "(?i)SQL_CALC_FOUND_ROWS\\s+"
#     replace: ""

# Query firewall: block queries matching a pattern with a clean MySQL error
# before they reach the backend. The emergency brake for a runaway plugin
# query: add the rule and `systemctl reload piko`, no restart. {prefix}
# expands to the table prefix.
#
# block:
#   - name: block-expensive-report
#     match: "(?i)FROM {prefix}postmeta.*FROM {prefix}postmeta"
