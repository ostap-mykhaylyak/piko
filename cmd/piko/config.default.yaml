# piko configuration
# Generated by `piko --init`.

listen:
  # Address WordPress connects to (DB_HOST in wp-config.php).
  address: "0.0.0.0:3306"

backend:
  # The MySQL server piko forwards to. Backend connections belong to piko
  # and are shared through the pool.
  address: "10.0.0.10:3306"
  username: "wordpress"
  password: "change-me"

# Optional: accounts that clients (WordPress) use to authenticate against
# piko. MySQL never sees these — they only exist between the application and
# piko, so they can differ from the real database credentials. If omitted,
# clients authenticate with the backend credentials above.
#
# users:
#   - username: "wordpress"
#     password: "change-me"

pool:
  # Cap on backend connections (in use + idle).
  max_open: 100
  # Idle connections kept warm for reuse by new client sessions.
  max_idle: 10
  # How often idle connections receive a COM_PING so MySQL's wait_timeout
  # never closes them ("MySQL server has gone away"). Applies both to pooled
  # connections and to connections attached to an inactive client.
  ping_interval: 30s
  # Close pooled connections unused for this long (0 = never).
  idle_timeout: 5m
  # How long a client waits for a connection when the pool is exhausted.
  acquire_timeout: 5s

cache:
  # WordPress-aware in-memory query cache with write-driven invalidation.
  enabled: true
  # WordPress table prefix ($table_prefix in wp-config.php).
  table_prefix: "wp_"
  # Cache the autoloaded options query (the hottest query of every
  # pageload), invalidated on writes to the options table.
  autoload_options: true
  # Cache transient reads (_transient_*/_site_transient_* options),
  # invalidated per option on writes.
  transients: true
  # Safety expiry for cached entries; write-driven invalidation is the
  # primary mechanism.
  default_ttl: 5m
  # Bounds for the in-memory store.
  max_entries: 10000
  max_result_bytes: 1048576   # skip caching results larger than this (1 MiB)
  # Directory with extra cache rules, e.g. the WooCommerce profile.
  # Default: the conf.d directory next to this file.
  # rules_dir: /etc/piko/conf.d

profiling:
  # Query profiling: statistics, slow query log and index suggestions,
  # all written to piko's log.
  enabled: false
  # Log statements slower than this immediately (0 disables it).
  slow_query: 500ms
  # How often the aggregated report is logged: per-query calls, total/avg/max
  # time, rows, cache hit ratio, heaviest queries first.
  report_interval: 10m
  # How many queries the report details.
  top_queries: 20
  # Run EXPLAIN on the heaviest queries and inspect the schema, logging
  # suggestions: missing indexes (with the ALTER TABLE ready to run),
  # redundant indexes and indexes never used since the MySQL server started.
  suggest_indexes: true

log:
  level: info           # debug | info | warn | error
  format: text          # text | json
  path: /var/log/piko   # directory for piko.log ("stdout" for console output)
